<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Smart Restock Advisor{% endblock %}</title>

    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    {% block extra_css %}{% endblock %}
</head>
<body>

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>Smart Restock</h2>
        </div>

        <nav class="sidebar-menu">
            <ul>
                <li><a href="/"><i class="fas fa-home"></i><span>Главная</span></a></li>
                <li><a href="/analytics"><i class="fas fa-chart-line"></i><span>Аналитика</span></a></li>
                <li><a href="/products"><i class="fas fa-boxes"></i><span>Товары</span></a></li>
                <li><a href="/orders"><i class="fas fa-file-invoice"></i><span>Заказы</span></a></li>
                <li><a href="/suppliers"><i class="fas fa-truck"></i><span>Поставщики</span></a></li>
            </ul>
        </nav>
    </aside>

    <!-- Main -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/static/js/script.js"></script>

    {% block extra_js %}{% endblock %}

</body>
</html>
