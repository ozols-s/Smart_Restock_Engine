{% extends "base.html" %}

{% block title %}Товары - Smart Restock{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/products.css') }}">
{% endblock %}

{% block content %}
<div class="products-container">

    <div class="products-header">
        <div class="page-title">
            <h1><i class="fas fa-boxes"></i> Управление товарами</h1>
        </div>
    </div>

    <div class="products-toolbar">
        <div class="search-box">
            <input type="text" class="search-input" placeholder="Поиск..." id="searchInput">
        </div>
        <div class="products-count">
            <span id="totalCount">Всего товаров: 0</span>
        </div>
    </div>

    <div class="table-container">
        <table class="products-table">
            <thead>
                <tr>
                    <th>Код</th>
                    <th>Название</th>
                    <th>Артикул</th>
                    <th>Ед. изм.</th>
                    <th>НДС</th>
                    <th>Тип</th>
                </tr>
            </thead>
            <tbody id="productsTableBody">
            </tbody>
        </table>
    </div>

</div>
{% endblock %}

{% block extra_js %}
<script>
let allProducts = [];

async function loadProducts() {
    try {
        const response = await fetch('/api/products');
        const data = await response.json();

        allProducts = data.data;
        renderProducts(allProducts);

        document.getElementById('totalCount').innerText =
            `Всего товаров: ${allProducts.length}`;

    } catch (error) {
        console.error('Ошибка загрузки:', error);
    }
}

function renderProducts(products) {
    const tbody = document.getElementById('productsTableBody');
    tbody.innerHTML = '';

    if (products.length === 0) {
        tbody.innerHTML = `
            <tr>
                <td colspan="6" style="text-align:center; padding:20px;">
                    Нет данных
                </td>
            </tr>
        `;
        return;
    }

    products.forEach(p => {
        const row = document.createElement('tr');

        row.innerHTML = `
            <td><code>${p.code || '—'}</code></td>
            <td><strong>${p.descr || 'Без названия'}</strong></td>
            <td>${p.article || '—'}</td>
            <td>${p.measure || 'шт.'}</td>
            <td>${p.nds_rate ? p.nds_rate + '%' : '0%'}</td>
            <td>
                ${p.is_folder
                    ? '<span class="type-badge folder">Папка</span>'
                    : '<span class="type-badge product">Товар</span>'}
            </td>
        `;

        tbody.appendChild(row);
    });
}

document.getElementById('searchInput').addEventListener('keyup', function() {
    const term = this.value.toLowerCase();

    const filtered = allProducts.filter(p =>
        (p.code || '').toLowerCase().includes(term) ||
        (p.descr || '').toLowerCase().includes(term)
    );

    renderProducts(filtered);
});

document.addEventListener('DOMContentLoaded', loadProducts);
</script>
{% endblock %}
